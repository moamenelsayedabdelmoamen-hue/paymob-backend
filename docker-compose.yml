version: '3.8'

services:
  paymob-backend:
    build: .
    container_name: paymob-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - PAYMOB_API_KEY=${PAYMOB_API_KEY}
      - PAYMOB_MERCHANT_ID=${PAYMOB_MERCHANT_ID}
      - PAYMOB_IFRAME_ID=${PAYMOB_IFRAME_ID}
      - PAYMOB_API_URL=https://accept.paymobsolutions.com/api
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    restart: unless-stopped
    networks:
      - paymob-network

networks:
  paymob-network:
    driver: bridge
